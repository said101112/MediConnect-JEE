<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>MediConnect – Planning</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f8fafc; color:#1e293b; display:flex; min-height:100vh; }

        .sidebar { width:240px; background:#fff; border-right:1px solid #e2e8f0; display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100; }
        .sidebar-logo { display:flex; align-items:center; gap:10px; padding:20px; border-bottom:1px solid #f1f5f9; }
        .logo-icon { width:38px; height:38px; background:#2563eb; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-size:18px; }
        .logo-text { font-weight:700; font-size:1rem; color:#1e293b; }
        .logo-sub  { font-size:0.72rem; color:#94a3b8; }
        .sidebar-nav { flex:1; padding:16px 12px; }
        .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:#64748b; text-decoration:none; font-size:0.9rem; font-weight:500; transition:all 0.15s; margin-bottom:2px; }
        .nav-item:hover { background:#f1f5f9; color:#1e293b; }
        .nav-item.active { background:#eff6ff; color:#2563eb; }
        .nav-item i { width:18px; text-align:center; }
        .nav-section-label { font-size:0.68rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; padding:12px 8px 6px; }
        .sidebar-footer { padding:16px 20px; border-top:1px solid #f1f5f9; display:flex; align-items:center; gap:10px; }
        .avatar { width:36px; height:36px; background:linear-gradient(135deg,#2563eb,#1d4ed8); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.85rem; flex-shrink:0; }
        .avatar-name { font-size:0.85rem; font-weight:600; color:#1e293b; }
        .avatar-role { font-size:0.72rem; color:#94a3b8; }

        .main { margin-left:240px; flex:1; display:flex; flex-direction:column; }
        .topbar { background:white; border-bottom:1px solid #e2e8f0; padding:14px 28px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:50; }
        .topbar-title { font-size:1.1rem; font-weight:700; color:#1e293b; }
        .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
        .icon-btn { width:38px; height:38px; border-radius:9px; border:1px solid #e2e8f0; background:white; display:flex; align-items:center; justify-content:center; color:#64748b; cursor:pointer; position:relative; }
        .badge-dot { position:absolute; top:7px; right:7px; width:7px; height:7px; background:#ef4444; border-radius:50%; border:1.5px solid white; }

        .content { padding:28px; }

        /* WEEK NAV */
        .week-nav { display:flex; align-items:center; justify-content:space-between; background:white; border:1px solid #e2e8f0; border-radius:12px; padding:14px 20px; margin-bottom:20px; }
        .week-label { font-size:1rem; font-weight:600; color:#1e293b; }
        .week-label span { color:#2563eb; }
        .btn-nav { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; background:white; color:#475569; font-size:0.85rem; font-weight:500; cursor:pointer; }
        .btn-nav:hover { background:#f1f5f9; }
        .btn-today { padding:8px 16px; background:#2563eb; color:white; border:none; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; }
        .btn-today:hover { background:#1d4ed8; }

        /* CARDS */
        .card { background:white; border-radius:14px; border:1px solid #e2e8f0; overflow:hidden; margin-bottom:20px; }
        .card-header { padding:16px 20px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; justify-content:space-between; }
        .card-header h3 { font-size:1rem; font-weight:600; color:#1e293b; display:flex; align-items:center; gap:8px; }
        .count-badge { background:#eff6ff; color:#2563eb; font-size:0.75rem; font-weight:700; padding:2px 8px; border-radius:20px; }

        /* TABLE */
        .rdv-table { width:100%; border-collapse:collapse; }
        .rdv-table th { text-align:left; font-size:0.72rem; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; padding:12px 20px; border-bottom:1px solid #f1f5f9; }
        .rdv-table td { padding:14px 20px; border-bottom:1px solid #f8fafc; font-size:0.88rem; vertical-align:middle; }
        .rdv-table tr:last-child td { border-bottom:none; }
        .rdv-table tr:hover td { background:#fafbfc; }

        .patient-cell { display:flex; align-items:center; gap:10px; }
        .p-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:700; color:white; flex-shrink:0; background:#2563eb; }
        .p-name  { font-size:0.88rem; font-weight:600; color:#1e293b; }
        .p-motif { font-size:0.78rem; color:#94a3b8; }

        .time-badge { display:inline-flex; align-items:center; gap:5px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px; padding:4px 10px; font-size:0.82rem; font-weight:600; color:#374151; }

        .pill { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .pill::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
        .pill-progress  { background:#eff6ff; color:#2563eb; }
        .pill-planned   { background:#f8fafc;  color:#64748b; }
        .pill-done      { background:#f0fdf4;  color:#16a34a; }
        .pill-cancelled { background:#fef2f2;  color:#dc2626; }

        .btn-consult { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; background:#2563eb; color:white; border:none; border-radius:7px; font-size:0.82rem; font-weight:600; cursor:pointer; }
        .btn-consult:hover { background:#1d4ed8; }
        .btn-cancel  { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; background:white; color:#dc2626; border:1px solid #fecaca; border-radius:7px; font-size:0.82rem; font-weight:600; cursor:pointer; margin-left:6px; }
        .btn-cancel:hover { background:#fef2f2; }

        .empty-state { text-align:center; padding:40px; color:#94a3b8; font-size:0.88rem; }
        .empty-state i { font-size:2.5rem; color:#cbd5e1; display:block; margin-bottom:10px; }

        /* WEEK GRID */
        .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:12px; }
        .day-col { background:white; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; }
        .day-header { padding:10px; text-align:center; border-bottom:1px solid #f1f5f9; }
        .day-name { font-size:0.72rem; font-weight:600; color:#94a3b8; text-transform:uppercase; }
        .day-num  { font-size:1.1rem; font-weight:700; color:#1e293b; margin-top:2px; }
        .day-col.today .day-header { background:#eff6ff; }
        .day-col.today .day-num    { color:#2563eb; }
        .day-rdv { padding:8px; }
        .day-rdv-item { background:#eff6ff; border-left:3px solid #2563eb; border-radius:6px; padding:6px 8px; margin-bottom:6px; font-size:0.75rem; }
        .day-rdv-item .rdv-time   { font-weight:700; color:#1e293b; }
        .day-rdv-item .rdv-patient{ color:#475569; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .day-rdv-item.done   { background:#f0fdf4; border-color:#16a34a; }
        .day-rdv-item.annule { background:#fef2f2; border-color:#dc2626; opacity:0.7; }
        .day-empty { padding:12px 8px; text-align:center; color:#cbd5e1; font-size:0.75rem; }
    </style>
</h:head>

<h:body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-shield-halved"/></div>
            <div>
                <div class="logo-text">MediConnect</div>
                <div class="logo-sub">Clinic Management</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.xhtml"  class="nav-item"><i class="fas fa-th-large"/> Dashboard</a>
            <a href="#"                class="nav-item"><i class="fas fa-user-injured"/> Patients</a>
            <a href="planning.xhtml"   class="nav-item active"><i class="fas fa-calendar-check"/> Appointments</a>
            <a href="historique.xhtml" class="nav-item"><i class="fas fa-stethoscope"/> Consultations</a>
            <a href="#"                class="nav-item"><i class="fas fa-file-invoice-dollar"/> Billing</a>
            <div class="nav-section-label">System</div>
            <a href="#"                class="nav-item"><i class="fas fa-gear"/> Settings</a>
        </nav>
        <div class="sidebar-footer">
            <h:form id="logoutFormPlus" style="width: 100%;">
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <div class="avatar">Dr</div>
                    <div style="flex: 1;">
                        <div class="avatar-name">Dr. <h:outputText value="#{medecinBean.medecinConnecte.fullName}"/></div>
                        <div class="avatar-role"><h:outputText value="#{medecinBean.medecinConnecte.specialite}"/></div>
                    </div>
                    <p:commandLink action="#{loginBean.logout}" ajax="false" title="Déconnexion"
                                   style="color: #64748b; transition: color 0.2s;" 
                                   onmouseover="this.style.color='#ef4444'" 
                                   onmouseout="this.style.color='#64748b'">
                        <i class="fas fa-sign-out-alt" style="font-size: 1.1rem;"></i>
                    </p:commandLink>
                </div>
            </h:form>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">
                <i class="fas fa-calendar-check" style="color:#2563eb;margin-right:8px;"/>
                Planning
            </span>
            <div class="topbar-right">
                <div class="icon-btn"><i class="fas fa-bell"/><span class="badge-dot"/></div>
            </div>
        </div>

        <div class="content">
            <h:form id="planningForm">

                <p:messages showDetail="true" closable="true"/>

                <!-- WEEK NAVIGATION -->
                <div class="week-nav">
                    <p:commandButton value="← Semaine précédente" styleClass="btn-nav"
                                     action="#{medecinBean.semainePrecedente}"
                                     update="planningForm"/>
                    <div class="week-label">
                        Semaine du <span><h:outputText value="#{medecinBean.semaineLabel}"/></span>
                    </div>
                    <p:commandButton value="Semaine suivante →" styleClass="btn-nav"
                                     action="#{medecinBean.semaineSuivante}"
                                     update="planningForm"/>
                </div>

                <!-- TODAY'S APPOINTMENTS -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-calendar-day" style="color:#2563eb;"/>
                            Rendez-vous du jour
                            <span class="count-badge"><h:outputText value="#{medecinBean.nombreRdvDuJour}"/></span>
                        </h3>
                    </div>

                    <h:panelGroup rendered="#{empty medecinBean.rdvDuJour}">
                        <div class="empty-state">
                            <i class="fas fa-calendar-xmark"/>
                            Aucun rendez-vous aujourd'hui
                        </div>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{not empty medecinBean.rdvDuJour}">
                        <table class="rdv-table">
                            <thead>
                            <tr>
                                <th>Patient</th>
                                <th>Heure</th>
                                <th>Motif</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <ui:repeat value="#{medecinBean.rdvDuJour}" var="rdv">
                                <tr>
                                    <td>
                                        <div class="patient-cell">
                                            <div class="p-avatar">
                                                <h:outputText value="#{rdv.patient.prenom.substring(0,1)}#{rdv.patient.nom.substring(0,1)}"/>
                                            </div>
                                            <div>
                                                <div class="p-name"><h:outputText value="#{rdv.patient.fullName}"/></div>
                                                <div class="p-motif"><h:outputText value="#{rdv.patient.telephone}"/></div>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                            <span class="time-badge">
                                                <i class="fas fa-clock"/>
                                                <h:outputText value="#{rdv.heureFormatee}"/>
                                            </span>
                                    </td>
                                    <td><h:outputText value="#{rdv.motif}"/></td>
                                    <td>
                                        <h:outputText value="En cours"   styleClass="pill pill-progress"  rendered="#{rdv.statut.name() == 'EN_COURS'}"/>
                                        <h:outputText value="Planifié"   styleClass="pill pill-planned"   rendered="#{rdv.statut.name() == 'PLANIFIE'}"/>
                                        <h:outputText value="Terminé"    styleClass="pill pill-done"      rendered="#{rdv.statut.name() == 'TERMINE'}"/>
                                        <h:outputText value="Annulé"     styleClass="pill pill-cancelled" rendered="#{rdv.statut.name() == 'ANNULE'}"/>
                                    </td>
                                    <td>
                                        <p:commandButton value="Consulter" styleClass="btn-consult"
                                                         action="#{medecinBean.ouvrirConsultation(rdv.id)}"
                                                         rendered="#{rdv.statut.name() != 'ANNULE' and rdv.statut.name() != 'TERMINE'}"/>
                                        <p:commandButton value="Annuler" styleClass="btn-cancel"
                                                         action="#{medecinBean.annulerRdv(rdv.id)}"
                                                         rendered="#{rdv.statut.name() == 'PLANIFIE'}"
                                                         onclick="return confirm('Annuler ce rendez-vous ?')"
                                                         update="planningForm"/>
                                    </td>
                                </tr>
                            </ui:repeat>
                            </tbody>
                        </table>
                    </h:panelGroup>
                </div>

                <!-- WEEK GRID -->
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-calendar-week" style="color:#2563eb;"/>
                            Vue hebdomadaire
                        </h3>
                    </div>
                    <div style="padding:16px;">
                        <div class="week-grid">

                            <ui:repeat value="#{medecinBean.rdvDeLaSemaine}" var="rdv">
                                <div class="day-rdv">
                                    <div class="day-rdv-item #{rdv.statut.name() == 'TERMINE' ? 'done' : rdv.statut.name() == 'ANNULE' ? 'annule' : ''}">
                                        <div class="rdv-time"><h:outputText value="#{rdv.heureFormatee}"/></div>
                                        <div class="rdv-patient"><h:outputText value="#{rdv.patient.fullName}"/></div>
                                    </div>
                                </div>
                            </ui:repeat>

                        </div>
                    </div>
                </div>

            </h:form>
        </div>
    </div>

</h:body>
</html>
