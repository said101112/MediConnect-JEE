<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets" xmlns:p="http://primefaces.org/ui" template="layout.xhtml">

    <ui:define name="title">Billing - Secrétaire</ui:define>

    <ui:define name="topbar-title">
        <i class="pi pi-wallet" style="color: var(--primary-color);"></i> Billing
    </ui:define>

    <ui:define name="content">
        <style>
            .card {
                background: white;
                border-radius: 12px;
                padding: 24px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
                border: 1px solid var(--surface-border);
            }

            .status-badge {
                padding: 6px 12px;
                border-radius: 20px;
                font-weight: 600;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .status-PAYE {
                background-color: #d1fae5;
                color: #065f46;
            }

            .status-NON_PAYE {
                background-color: #fee2e2;
                color: #991b1b;
            }
        </style>

        <p:growl id="messages" showDetail="true" />

        <div class="card">
            <h:form id="form">
                <p:dataTable id="facturesTable" var="facture" value="#{facturationBean.factures}" paginator="true"
                    rows="10" emptyMessage="Aucune facture à afficher." styleClass="ui-datatable-striped">

                    <p:column headerText="Date">
                        <h:outputText value="#{facture.dateFacture}" />
                    </p:column>

                    <p:column headerText="Patient">
                        <h:outputText value="#{facture.consultation.patient.fullName}" style="font-weight: 500;" />
                    </p:column>

                    <p:column headerText="Motif / Consultation">
                        <h:outputText value="#{facture.consultation.rendezVous.motif}" />
                    </p:column>

                    <p:column headerText="Montant">
                        <h:outputText value="#{facture.montantTotal} DH"
                            style="font-weight:700; color: var(--primary-color);" />
                    </p:column>

                    <p:column headerText="Statut">
                        <h:outputText value="#{facture.statutPaiement}"
                            styleClass="status-badge status-#{facture.statutPaiement}" />
                    </p:column>

                    <p:column headerText="Actions" style="width: 200px; text-align: center;">
                        <p:commandButton icon="pi pi-pencil" title="Modifier Montant"
                            update=":editAmountForm:editAmountDialog" oncomplete="PF('editAmountWV').show();"
                            disabled="#{facture.statutPaiement eq 'PAYE'}"
                            styleClass="ui-button-flat ui-button-info" style="margin-right: 8px;">
                            <f:setPropertyActionListener value="#{facture}" target="#{facturationBean.selectedFacture}" />
                        </p:commandButton>

                        <p:commandButton value="Encaisser" icon="pi pi-check"
                            action="#{facturationBean.encaisser(facture)}" update="facturesTable :messages"
                            disabled="#{facture.statutPaiement eq 'PAYE'}"
                            styleClass="#{facture.statutPaiement eq 'PAYE' ? 'ui-button-flat' : 'ui-button-success'}" />
                    </p:column>
                </p:dataTable>
            </h:form>
        </div>

        <p:dialog id="editAmountDialog" widgetVar="editAmountWV" header="Ajuster le Montant" modal="true" responsive="true" width="350" appendTo="@(body)">
            <h:form id="editAmountForm">
                <div class="ui-fluid">
                    <div class="field" style="margin-bottom: 20px;">
                        <p:outputLabel for="amount" value="Nouveau Montant (DH)" />
                        <p:inputNumber id="amount" value="#{facturationBean.selectedFacture.montantTotal}" 
                                      symbol=" DH" symbolPosition="s" decimalPlaces="2" />
                    </div>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <p:commandButton value="Enregistrer" icon="pi pi-check" 
                                     action="#{facturationBean.modifierMontant(facturationBean.selectedFacture)}"
                                     update=":form:facturesTable :messages"
                                     oncomplete="if (!args.validationFailed) PF('editAmountWV').hide()" />
                    <p:commandButton value="Annuler" icon="pi pi-times" onclick="PF('editAmountWV').hide()" 
                                     styleClass="ui-button-secondary ui-button-flat" type="button" style="margin-left: 8px;"/>
                </div>
            </h:form>
        </p:dialog>
    </ui:define>

</ui:composition>
