<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="jakarta.faces.html" xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets" xmlns:p="http://primefaces.org/ui">

<h:head>
    <f:facet name="first">
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </f:facet>
    <title>
        <ui:insert name="title">MediConnect - Workspace</ui:insert>
    </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <style>
        :root {
            --primary-color: #0f1923;
            --primary-lt: #f7f5f0;
            --accent: #c8873a;
            --primary-color-text: #ffffff;
            --surface-ground: #f7f5f0;
            --surface-section: #ffffff;
            --surface-border: #e2e8f0;
            --text-color: #0f1923;
            --text-color-secondary: #4a5568;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--surface-ground);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .layout-sidebar {
            width: var(--sidebar-width);
            background-color: var(--surface-section);
            border-right: 1px solid var(--surface-border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
            z-index: 10;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            padding: 24px;
            gap: 12px;
            text-decoration: none;
        }

        .sidebar-logo-icon {
            width: 38px;
            height: 38px;
            background: #0f1923;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .sidebar-logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #c8873a;
            font-family: 'DM Serif Display', serif;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0 16px;
            margin: 0;
            flex: 1;
        }

        .sidebar-menu li {
            margin-bottom: 8px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-color-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            gap: 12px;
        }

        .sidebar-menu a i {
            font-size: 1.2rem;
        }

        .sidebar-menu a:hover {
            background-color: #f1f5f9;
            color: var(--text-color);
        }

        .sidebar-menu a.active {
            background-color: #eff6ff;
            color: var(--primary-color);
        }

        .user-profile {
            padding: 20px;
            border-top: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            margin: 16px;
            border-radius: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-color);
        }

        .user-role {
            font-size: 12px;
            color: var(--text-color-secondary);
        }

        /* Main Content Styles */
        .layout-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        .layout-topbar {
            height: 80px;
            background-color: var(--surface-ground);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--surface-border);
        }

        .topbar-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-bar {
            position: relative;
        }

        .search-bar i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color-secondary);
        }

        .search-bar input {
            padding: 10px 16px 10px 40px;
            border-radius: 20px;
            border: 1px solid var(--surface-border);
            background: var(--surface-section);
            width: 300px;
            outline: none;
            font-family: 'Inter';
            color: var(--text-color);
        }

        .layout-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        /* Override Primefaces to look more modern */
        .ui-widget {
            font-family: 'Inter', sans-serif !important;
        }

        .ui-datatable .ui-datatable-header,
        .ui-datatable .ui-column-title {
            font-weight: 600 !important;
            background: #f8fafc !important;
        }

        .ui-button {
            border-radius: 8px !important;
            font-weight: 500 !important;
        }

        .ui-button.ui-button-primary {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
        }
    </style>
</h:head>

<h:body>
    <div class="layout-sidebar">
        <a href="dashboard.xhtml" class="sidebar-logo">
            <div class="sidebar-logo-icon"><i class="pi pi-shield"></i></div>
            <span class="sidebar-logo-text">MediConnect</span>
        </a>

        <ul class="sidebar-menu">
            <li>
                <a href="dashboard.xhtml" class="#{view.viewId == '/views/secretaire/dashboard.xhtml' ? 'active' : ''}">
                    <i class="pi pi-th-large"></i> Dashboard
                </a>
            </li>
            <li>
                <a href="gestion_patients.xhtml"
                    class="#{view.viewId == '/views/secretaire/gestion_patients.xhtml' ? 'active' : ''}">
                    <i class="pi pi-users"></i> Patients
                </a>
            </li>
            <li>
                <a href="agenda.xhtml" class="#{view.viewId == '/views/secretaire/agenda.xhtml' ? 'active' : ''}">
                    <i class="pi pi-calendar"></i> Appointments
                </a>
            </li>
            <li>
                <a href="facturation.xhtml"
                    class="#{view.viewId == '/views/secretaire/facturation.xhtml' ? 'active' : ''}">
                    <i class="pi pi-wallet"></i> Billing
                </a>
            </li>
        </ul>

        <h:form>
            <div class="user-profile">
                <div class="user-avatar">
                    S
                </div>
                <div class="user-info">
                    <span class="user-name">Secrétaire</span>
                    <span class="user-role">Administrator</span>
                </div>
                <div style="flex-grow: 1; text-align: right;">
                    <p:commandLink action="#{loginBean.logout}" ajax="false" title="Logout">
                        <i class="pi pi-sign-out" style="color: var(--text-color-secondary); font-size: 1.2rem;"></i>
                    </p:commandLink>
                </div>
            </div>
        </h:form>
    </div>

    <div class="layout-main">
        <div class="layout-topbar">
            <div class="topbar-title">
                <ui:insert name="topbar-title">
                    <i class="pi pi-compass"></i> Overview
                </ui:insert>
            </div>

            <div class="topbar-right">
                <ui:insert name="topbar-actions">
                    <!-- Default empty, can be overridden -->
                </ui:insert>

                <div
                    style="width: 40px; height: 40px; border-radius: 50%; background: white; display:flex; align-items:center; justify-content:center; border: 1px solid #e2e8f0; cursor: pointer;">
                    <i class="pi pi-bell" style="color: var(--text-color-secondary);"></i>
                </div>
            </div>
        </div>

        <div class="layout-content">
            <ui:insert name="content">
                Content goes here...
            </ui:insert>
        </div>
    </div>
</h:body>

</html>
